<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صدقة جارية - العداد الإلكتروني</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            background-color: #1a365d;
            color: #fff;
            padding: 40px 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        header h1 {
            margin: 0;
            font-size: 2.5rem;
        }
        header p {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-top: 10px;
            line-height: 1.6;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
        }
        .card {
            background: #fff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 {
            color: #2c5282;
            margin-top: 0;
            font-size: 1.5rem;
        }
        /* تصميم قائمة اختيار الذكر */
        .select-box {
            margin: 20px 0;
        }
        select {
            font-size: 1.2rem;
            font-family: inherit;
            padding: 10px 20px;
            border-radius: 8px;
            border: 2px solid #3182ce;
            background-color: white;
            color: #2c5282;
            width: 100%;
            max-width: 350px;
            cursor: pointer;
            outline: none;
        }
        .counter-box {
            padding: 30px 20px;
            background: #ebf8ff;
            border-radius: 8px;
            border: 1px solid #bee3f8;
            margin-top: 20px;
        }
        .counter-number {
            font-size: 4rem;
            font-weight: bold;
            color: #2b6cb0;
            margin: 10px 0;
        }
        .btn-style {
            background-color: #3182ce;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.4rem;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 6px rgba(49, 130, 206, 0.3);
            width: 100%;
            max-width: 350px;
            font-weight: bold;
        }
        .btn-style:hover {
            background-color: #2b6cb0;
        }
        .btn-style:active {
            transform: scale(0.98);
        }
        /* زر إعادة التصفير */
        .reset-btn {
            background: none;
            border: none;
            color: #e53e3e;
            cursor: pointer;
            margin-top: 15px;
            font-size: 1rem;
            text-decoration: underline;
        }
        footer {
            margin-top: 60px;
            padding: 20px;
            background: #2d3748;
            color: #a0aec0;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>صدقة جارية</h1>
        <p>اللهم اغفر لـ (جدتي أم أمي، وجدتي أم أبي، وجدي، وخالي، وعمتي) وارحمهم وأسكنهم فسيح جناتك</p>
    </header>

    <div class="container">

        <div class="card">
            <h2>السبحة الإلكترونية التفاعلية</h2>
            <p style="color: #718096;">اختر الذكر من القائمة واضغط على الزر للتسبيح، ولكم بمثل الأجر إن شاء الله</p>
            
            <!-- قائمة اختيار الذكر -->
            <div class="select-box">
                <select id="dhikrSelect" onchange="updateButtonText()">
                    <option value="أستغفر الله العظيم وأتوب إليه">أستغفر الله العظيم وأتوب إليه</option>
                    <option value="سبحان الله وبحمده">سبحان الله وبحمده</option>
                    <option value="الحمد لله">الحمد لله</option>
                    <option value="الله أكبر">الله أكبر</option>
                    <option value="لا إله إلا الله">لا إله إلا الله</option>
                </select>
            </div>

            <!-- العداد والزر -->
            <div class="counter-box">
                <div class="counter-number" id="counter">0</div>
                <button class="btn-style" id="dhikrBtn" onclick="incrementCounter()">أستغفر الله العظيم وأتوب إليه</button>
                <br>
                <button class="reset-btn" onclick="resetCounter()">تصفير العداد</button>
            </div>
        </div>

    </div>

    <footer>
        <p>الدال على الخير كفاعله - انشر الموقع ليتضاعف الأجر</p>
    </footer>

    <script>
        let count = 0;

        // دالة لزيادة العداد عند الضغط
        function incrementCounter() {
            count++;
            document.getElementById("counter").innerText = count;
        }

        // دالة لتحديث نص الزر بناءً على الذكر المختار
        function updateButtonText() {
            const selectElement = document.getElementById("dhikrSelect");
            const selectedText = selectElement.options[selectElement.selectedIndex].value;
            document.getElementById("dhikrBtn").innerText = selectedText;
        }

        // دالة لتصفير العداد
        function resetCounter() {
            count = 0;
            document.getElementById("counter").innerText = count;
        }
    </script>

</body>
</html>
